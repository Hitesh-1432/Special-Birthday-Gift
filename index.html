<html lang="en">

</body>
<!-- First Container -->
  <audio id="clickSound" src="clickSound.mp3" preload="auto"></audio>
  <div id="firstBox" class="firstContainer show">

  <!-- Yes Click Box -->
  <div id="secondBox" class="secondContainer">

    </div>

      <button onclick="sendAnswer('no')" class="noBtn">No🙃</button>
